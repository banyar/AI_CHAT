<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2e3147;
      --accent:    #6c63ff;
      --accent2:   #4ade80;
      --text:      #e2e8f0;
      --text-dim:  #64748b;
      --user-bg:   #6c63ff;
      --ai-bg:     #1e2235;
      --radius:    12px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header p  { font-size: 0.75rem; color: var(--text-dim); }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 6px var(--accent2);
    }
    .status-info {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: .04em;
    }
    .badge-colab  { background: #1a3a2a; color: var(--accent2); border: 1px solid var(--accent2); }
    .badge-local  { background: #1e2235; color: var(--text-dim); border: 1px solid var(--border); }
    .status-url {
      font-size: 0.7rem;
      color: var(--text-dim);
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
      flex-shrink: 0;
    }
    .sidebar h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-dim);
    }
    .sidebar textarea {
      flex: 1;
      resize: none;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.875rem;
      padding: 10px 12px;
      min-height: 120px;
      outline: none;
    }
    .sidebar textarea:focus { border-color: var(--accent); }

    /* ── Chat area ── */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      gap: 10px;
      max-width: 80%;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai   { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .msg.user .avatar { background: var(--user-bg); }
    .msg.ai   .avatar { background: var(--ai-bg); border: 1px solid var(--border); }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 0.9rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble { background: var(--user-bg); border-bottom-right-radius: 3px; }
    .msg.ai   .bubble { background: var(--ai-bg); border: 1px solid var(--border); border-bottom-left-radius: 3px; }

    .bubble.error { background: #3b1219; border-color: #7f1d1d; color: #fca5a5; }

    /* typing indicator */
    .typing .bubble { display: flex; gap: 4px; align-items: center; padding: 14px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); animation: bounce .9s infinite; }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ── Input bar ── */
    .input-bar {
      display: flex;
      gap: 10px;
      padding: 14px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.9rem;
      padding: 10px 14px;
      outline: none;
      resize: none;
      min-height: 44px;
      max-height: 140px;
    }
    #input:focus { border-color: var(--accent); }

    button {
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
      transition: opacity .15s;
    }
    button:disabled { opacity: .5; cursor: not-allowed; }
    button:not(:disabled):hover { opacity: .85; }

    #send-btn   { background: var(--accent); color: #fff; }
    #ingest-btn { background: var(--accent2); color: #000; }
    #clear-btn  { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }

    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--accent2);
      color: #000;
      padding: 10px 18px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 0.875rem;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .3s, transform .3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: none; }

    @media (max-width: 640px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🤖</div>
  <div>
    <h1>RAG Chatbot</h1>
    <p>Chat with your data · Ollama + Qdrant</p>
  </div>
  <div class="status-info">
    <div class="status-dot"></div>
    <span class="status-badge badge-local" id="status-badge">Local</span>
    <span class="status-url" id="status-url">localhost:11434</span>
  </div>
</header>

<div class="layout">

  <!-- Sidebar: Knowledge Base -->
  <aside class="sidebar">
    <h2>📚 Knowledge Base</h2>
    <textarea id="ingest-text" placeholder="Paste text to add to the knowledge base…"></textarea>
    <button id="ingest-btn">Add to KB</button>
    <button id="clear-btn">Clear History</button>
  </aside>

  <!-- Chat -->
  <div class="chat-area">
    <div id="messages">
      <div class="msg ai">
        <div class="avatar">🤖</div>
        <div class="bubble">Hello! I'm your RAG assistant. Ask me anything, or add documents to my knowledge base using the panel on the left.</div>
      </div>
    </div>

    <div class="input-bar">
      <textarea id="input" rows="1" placeholder="Type a message… (Enter to send, Shift+Enter for newline)"></textarea>
      <button id="send-btn">Send ➤</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');
  const ingestBtn  = document.getElementById('ingest-btn');
  const clearBtn   = document.getElementById('clear-btn');
  const ingestText = document.getElementById('ingest-text');
  const toastEl    = document.getElementById('toast');

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  // Send on Enter (Shift+Enter = newline)
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);
  ingestBtn.addEventListener('click', ingestDocument);
  clearBtn.addEventListener('click', clearHistory);

  function addMsg(role, text, isError = false) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="avatar">${role === 'user' ? '🧑' : '🤖'}</div>
      <div class="bubble${isError ? ' error' : ''}">${escHtml(text)}</div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'msg ai typing';
    div.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    `;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addMsg('user', text);
    const typing = addTyping();

    // Create AI bubble for streaming tokens
    let aiBubble = null;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      if (!res.ok) { throw new Error('Server error ' + res.status); }

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const json = line.slice(6).trim();
          if (!json) continue;

          try {
            const obj = JSON.parse(json);

            if (obj.error) {
              typing.remove();
              addMsg('ai', obj.error, true);
              return;
            }

            if (obj.token) {
              if (!aiBubble) {
                typing.remove();
                // Create streaming bubble
                const div = document.createElement('div');
                div.className = 'msg ai';
                div.innerHTML = '<div class="avatar">🤖</div><div class="bubble"></div>';
                messagesEl.appendChild(div);
                aiBubble = div.querySelector('.bubble');
              }
              aiBubble.appendChild(document.createTextNode(obj.token));
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          } catch (_) {}
        }
      }

      if (!aiBubble) { typing.remove(); }

    } catch (err) {
      typing.remove();
      addMsg('ai', 'Connection error: ' + err.message, true);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  async function ingestDocument() {
    const text = ingestText.value.trim();
    if (!text) return;

    ingestBtn.disabled = true;
    try {
      const res = await fetch('/api/ingest', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      const data = await res.json();
      if (data.error) {
        showToast('❌ ' + data.error);
      } else {
        ingestText.value = '';
        showToast('✅ Added to knowledge base!');
      }
    } catch (err) {
      showToast('❌ ' + err.message);
    } finally {
      ingestBtn.disabled = false;
    }
  }

  async function clearHistory() {
    await fetch('/api/clear', { method: 'POST' });
    // Remove all messages except the first greeting
    while (messagesEl.children.length > 1) {
      messagesEl.removeChild(messagesEl.lastChild);
    }
    showToast('🗑️ History cleared');
  }

  function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 2500);
  }

  // Load status on page open
  async function loadStatus() {
    try {
      const res  = await fetch('/api/status');
      const data = await res.json();
      const badge = document.getElementById('status-badge');
      const urlEl = document.getElementById('status-url');
      if (data.is_colab) {
        badge.textContent = '🚀 Google Colab';
        badge.className   = 'status-badge badge-colab';
      } else {
        badge.textContent = '💻 Local';
        badge.className   = 'status-badge badge-local';
      }
      urlEl.textContent = data.ollama_url;
      urlEl.title       = `Model: ${data.ollama_model} | Embed: ${data.embed_model} | Qdrant: ${data.qdrant_url}`;
    } catch (_) {}
  }
  loadStatus();

  function escHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
